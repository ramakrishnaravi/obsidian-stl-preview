<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>STL Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #18181b;
      overflow: hidden;
      font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
    }

    #viewer {
      width: 100%; height: 100%;
      position: relative;
    }

    /* ── Drop zone ── */
    #drop-zone {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #6b7280;
      font-size: 15px;
      line-height: 1.8;
      text-align: center;
      border: 2px dashed #374151;
      border-radius: 10px;
      padding: 48px 72px;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.2s, color 0.2s;
      z-index: 10;
    }
    #drop-zone:hover {
      border-color: #2e74b5;
      color: #d1d5db;
    }
    #drop-zone .icon { font-size: 36px; display: block; margin-bottom: 10px; }
    #drop-zone small { font-size: 12px; color: #4b5563; }

    /* ── Info overlay (top-left) ── */
    #overlay {
      display: none;
      position: absolute;
      top: 12px; left: 14px;
      color: #9ca3af;
      font-size: 11px;
      line-height: 1.7;
      pointer-events: none;
      user-select: none;
      white-space: pre;
      z-index: 10;
    }

    /* ── Status / error line (bottom centre) ── */
    #status {
      display: none;
      position: absolute;
      bottom: 14px;
      left: 50%; transform: translateX(-50%);
      color: #9ca3af;
      font-size: 12px;
      z-index: 10;
    }

    /* ── Controls hint (bottom-right) ── */
    #hints {
      position: absolute;
      bottom: 12px; right: 14px;
      color: #374151;
      font-size: 10px;
      line-height: 1.7;
      text-align: right;
      pointer-events: none;
      user-select: none;
      white-space: pre;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="viewer">

    <div id="drop-zone">
      <span class="icon">&#x25A1;</span>
      Drop .stl file here<br>
      <small>or click to browse</small>
    </div>

    <div id="overlay"></div>
    <div id="status"></div>

    <div id="hints">Left drag: orbit
Right drag / middle: pan
Scroll: zoom</div>

  </div>

  <!-- BUNDLED_SCRIPT -->
</body>
</html>
